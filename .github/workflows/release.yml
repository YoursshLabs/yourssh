name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build macOS
        working-directory: app
        run: flutter build macos --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          zip -r "YourSSH-${{ steps.version.outputs.version }}-arm64-mac.zip" "$APP"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          create-dmg \
            --volname "YourSSH" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "YourSSH-${{ steps.version.outputs.version }}-arm64.dmg" \
            "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            YourSSH-${{ steps.version.outputs.version }}-arm64-mac.zip
            YourSSH-${{ steps.version.outputs.version }}-arm64.dmg

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content app/pubspec.yaml | Select-String '^version:').ToString().Split(':')[1].Trim().Split('+')[0]
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Copy portable exe
        shell: pwsh
        run: |
          Copy-Item "app\build\windows\x64\runner\Release\yourssh.exe" "YourSSH.${{ steps.version.outputs.version }}.exe"

      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $iss = "[Setup]`r`n"
          $iss += "AppName=YourSSH`r`n"
          $iss += "AppVersion=$ver`r`n"
          $iss += "DefaultDirName={autopf}\YourSSH`r`n"
          $iss += "DefaultGroupName=YourSSH`r`n"
          $iss += "OutputBaseFilename=YourSSH.Setup.$ver`r`n"
          $iss += "OutputDir=.`r`n"
          $iss += "Compression=lzma`r`n"
          $iss += "SolidCompression=yes`r`n"
          $iss += "`r`n[Files]`r`n"
          $iss += "Source: `"app\build\windows\x64\runner\Release\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs`r`n"
          $iss += "`r`n[Icons]`r`n"
          $iss += "Name: `"{group}\YourSSH`"; Filename: `"{app}\yourssh.exe`"`r`n"
          $iss += "Name: `"{commondesktop}\YourSSH`"; Filename: `"{app}\yourssh.exe`"`r`n"
          $iss += "`r`n[Run]`r`n"
          $iss += "Filename: `"{app}\yourssh.exe`"; Description: `"Launch YourSSH`"; Flags: nowait postinstall skipifsilent`r`n"
          $iss | Out-File -FilePath "installer.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            YourSSH.${{ steps.version.outputs.version }}.exe
            YourSSH.Setup.${{ steps.version.outputs.version }}.exe

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libkeybinder-3.0-dev

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Linux
        working-directory: app
        run: flutter build linux --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create .deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="yourssh_${VERSION}_amd64"
          mkdir -p "$PKG/DEBIAN" "$PKG/usr/share/yourssh" "$PKG/usr/bin" "$PKG/usr/share/applications"

          cp -r app/build/linux/x64/release/bundle/* "$PKG/usr/share/yourssh/"

          ln -s /usr/share/yourssh/yourssh "$PKG/usr/bin/yourssh"

          cat > "$PKG/usr/share/applications/yourssh.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=YourSSH
          Exec=/usr/share/yourssh/yourssh
          Icon=yourssh
          Type=Application
          Categories=Network;
          DESKTOP

          cat > "$PKG/DEBIAN/control" << CTRL
          Package: yourssh
          Version: $VERSION
          Architecture: amd64
          Maintainer: YourSSH Team
          Description: YourSSH - SSH client
          CTRL

          dpkg-deb --build "$PKG"

      - name: Create AppImage
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications

          cp -r app/build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/yourssh.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=YourSSH
          Exec=yourssh
          Icon=yourssh
          Type=Application
          Categories=Network;
          DESKTOP

          cp AppDir/yourssh.desktop AppDir/usr/share/applications/

          if [ -f "app/assets/icons/app_icon.png" ]; then
            cp app/assets/icons/app_icon.png AppDir/yourssh.png
          else
            convert -size 256x256 xc:"#1a1a2e" AppDir/yourssh.png 2>/dev/null || touch AppDir/yourssh.png
          fi

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE=$(dirname "$(readlink -f "$0")")
          exec "$HERE/usr/bin/yourssh" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir "YourSSH-${VERSION}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            yourssh_${{ steps.version.outputs.version }}_amd64.deb
            YourSSH-${{ steps.version.outputs.version }}.AppImage

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: macos-build

      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: YourSSH v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            yourssh_${{ steps.version.outputs.version }}_amd64.deb
            YourSSH-${{ steps.version.outputs.version }}-arm64-mac.zip
            YourSSH-${{ steps.version.outputs.version }}-arm64.dmg
            YourSSH-${{ steps.version.outputs.version }}.AppImage
            YourSSH.${{ steps.version.outputs.version }}.exe
            YourSSH.Setup.${{ steps.version.outputs.version }}.exe
