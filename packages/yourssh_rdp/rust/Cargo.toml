[package]
name = "yourssh_rdp"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.7.0"
ironrdp = { version = "0.15.0", features = ["connector", "session", "input", "graphics", "cliprdr"] }
ironrdp-tokio = "0.9.0"
ironrdp-tls = { version = "0.2.1", features = ["rustls"] }
ironrdp-cliprdr = "0.6.0"
sspi = { version = "0.21.0", features = ["network_client"] }
tokio = { version = "1", features = ["rt-multi-thread", "net", "sync", "macros", "time"] }
anyhow = "1"
futures = "0.3"
sha2 = "0.10"

[dev-dependencies]
tokio = { version = "1", features = ["test-util"] }
