name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

  # ── macOS ──────────────────────────────────────────────────────────────────
  # Builds arm64 (Apple Silicon) and x86_64 (Intel) in parallel, then a
  # follow-up job merges them into a universal binary with lipo.
  build-macos:
    needs: test
    strategy:
      matrix:
        include:
          - runner: macos-latest   # arm64 — M1/M2/M3
            arch: arm64
          - runner: macos-13       # x86_64 — Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build macOS
        working-directory: app
        run: flutter build macos --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          zip -r "YourSSH-${{ steps.version.outputs.version }}-macOS-${{ matrix.arch }}.zip" "$APP"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          create-dmg \
            --volname "YourSSH" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "YourSSH-${{ steps.version.outputs.version }}-macOS-${{ matrix.arch }}.dmg" \
            "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            YourSSH-${{ steps.version.outputs.version }}-macOS-${{ matrix.arch }}.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-${{ matrix.arch }}.dmg

  # Combine arm64 + x86_64 builds into a universal binary using lipo.
  build-macos-universal:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist/arm64

      - uses: actions/download-artifact@v4
        with:
          name: macos-x86_64
          path: dist/x86_64

      - name: Create universal binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          unzip -q "dist/arm64/YourSSH-${VERSION}-macOS-arm64.zip"   -d dist/arm64/extracted
          unzip -q "dist/x86_64/YourSSH-${VERSION}-macOS-x86_64.zip" -d dist/x86_64/extracted

          ARM_APP=$(find dist/arm64/extracted -name "*.app" -maxdepth 1 | head -1)
          X86_APP=$(find dist/x86_64/extracted -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$ARM_APP")

          mkdir -p "universal"
          cp -R "$ARM_APP" "universal/${APP_NAME}"

          # Merge every Mach-O binary with lipo; skip non-binaries silently.
          while IFS= read -r -d '' f; do
            rel="${f#$ARM_APP/}"
            x86f="$X86_APP/$rel"
            outf="universal/${APP_NAME}/$rel"
            if [ -f "$x86f" ] && file "$f" | grep -q "Mach-O"; then
              lipo -create "$f" "$x86f" -output "$outf" 2>/dev/null || true
            fi
          done < <(find "$ARM_APP" -type f -print0)

          (cd universal && zip -r "../YourSSH-${VERSION}-macOS-universal.zip" "${APP_NAME}")

          echo "UNIV_APP=universal/${APP_NAME}" >> $GITHUB_ENV

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create universal DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          create-dmg \
            --volname "YourSSH" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "YourSSH-${VERSION}-macOS-universal.dmg" \
            "${{ env.UNIV_APP }}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  # x64 is the standard target. arm64 (Windows on ARM / Snapdragon) is
  # supported since Flutter 3.22; set continue-on-error so a runner
  # availability issue doesn't block the entire release.
  build-windows:
    needs: test
    strategy:
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.arch == 'arm64' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content app/pubspec.yaml | Select-String '^version:').ToString().Split(':')[1].Trim().Split('+')[0]
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Copy portable exe
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          Copy-Item "app\build\windows\$arch\runner\Release\yourssh.exe" `
            "YourSSH-${ver}-Windows-${arch}.exe"

      - name: Install Inno Setup (ARM64 runner only)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"

          $iss  = "[Setup]`r`n"
          $iss += "AppName=YourSSH`r`n"
          $iss += "AppVersion=$ver`r`n"
          $iss += "DefaultDirName={autopf}\YourSSH`r`n"
          $iss += "DefaultGroupName=YourSSH`r`n"
          $iss += "OutputBaseFilename=YourSSH.Setup.${ver}-Windows-${arch}`r`n"
          $iss += "OutputDir=.`r`n"
          $iss += "Compression=lzma`r`n"
          $iss += "SolidCompression=yes`r`n"
          $iss += "`r`n[Files]`r`n"
          $iss += "Source: `"app\build\windows\$arch\runner\Release\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs`r`n"
          $iss += "`r`n[Icons]`r`n"
          $iss += "Name: `"{group}\YourSSH`"; Filename: `"{app}\yourssh.exe`"`r`n"
          $iss += "Name: `"{commondesktop}\YourSSH`"; Filename: `"{app}\yourssh.exe`"`r`n"
          $iss += "`r`n[Run]`r`n"
          $iss += "Filename: `"{app}\yourssh.exe`"; Description: `"Launch YourSSH`"; Flags: nowait postinstall skipifsilent`r`n"
          $iss | Out-File -FilePath "installer.iss" -Encoding UTF8
          & $iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            YourSSH-${{ steps.version.outputs.version }}-Windows-${{ matrix.arch }}.exe
            YourSSH.Setup.${{ steps.version.outputs.version }}-Windows-${{ matrix.arch }}.exe

  # ── Linux ──────────────────────────────────────────────────────────────────
  # Produces a .deb package and a portable tar.gz for both x86_64 and arm64.
  build-linux:
    needs: test
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            deb_arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            libkeybinder-3.0-dev libnotify-dev

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Linux
        working-directory: app
        run: flutter build linux --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Locate build bundle
        id: bundle
        run: |
          # Flutter outputs to the host architecture directory (x64 or arm64).
          ARCH="${{ matrix.arch }}"
          DIR="app/build/linux/${ARCH}/release/bundle"
          [ -d "$DIR" ] || DIR="app/build/linux/x64/release/bundle"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Create .deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DEB_ARCH="${{ matrix.deb_arch }}"
          BUNDLE="${{ steps.bundle.outputs.dir }}"
          PKG="yourssh_${VERSION}_${DEB_ARCH}"

          mkdir -p "$PKG/DEBIAN" \
                   "$PKG/usr/share/yourssh" \
                   "$PKG/usr/bin" \
                   "$PKG/usr/share/applications"

          cp -r "$BUNDLE"/. "$PKG/usr/share/yourssh/"
          ln -s /usr/share/yourssh/yourssh "$PKG/usr/bin/yourssh"

          cat > "$PKG/usr/share/applications/yourssh.desktop" << 'DESKTOP'
[Desktop Entry]
Name=YourSSH
Exec=/usr/share/yourssh/yourssh
Icon=yourssh
Type=Application
Categories=Network;
DESKTOP

          cat > "$PKG/DEBIAN/control" << CTRL
Package: yourssh
Version: ${VERSION}
Architecture: ${DEB_ARCH}
Maintainer: YourSSH Team
Description: YourSSH - SSH client
CTRL

          dpkg-deb --build "$PKG"

      - name: Create tar.gz archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          BUNDLE="${{ steps.bundle.outputs.dir }}"
          tar -czf "YourSSH-${VERSION}-Linux-${ARCH}.tar.gz" \
            -C "$(dirname "$BUNDLE")" "$(basename "$BUNDLE")"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            yourssh_${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}.deb
            YourSSH-${{ steps.version.outputs.version }}-Linux-${{ matrix.arch }}.tar.gz

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-macos-universal, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: YourSSH v${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            YourSSH-${{ steps.version.outputs.version }}-macOS-arm64.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-arm64.dmg
            YourSSH-${{ steps.version.outputs.version }}-macOS-x86_64.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-x86_64.dmg
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.dmg
            YourSSH-${{ steps.version.outputs.version }}-Windows-x64.exe
            YourSSH.Setup.${{ steps.version.outputs.version }}-Windows-x64.exe
            YourSSH-${{ steps.version.outputs.version }}-Windows-arm64.exe
            YourSSH.Setup.${{ steps.version.outputs.version }}-Windows-arm64.exe
            yourssh_${{ steps.version.outputs.version }}_amd64.deb
            YourSSH-${{ steps.version.outputs.version }}-Linux-x86_64.tar.gz
            yourssh_${{ steps.version.outputs.version }}_arm64.deb
            YourSSH-${{ steps.version.outputs.version }}-Linux-arm64.tar.gz
