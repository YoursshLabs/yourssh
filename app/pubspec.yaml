name: yourssh
description: YourSSH - A professional SSH client for macOS and Windows with advanced features like SFTP, port forwarding, and a built-in code editor.
publish_to: 'none'
version: 0.1.5+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # SSH / SFTP / Port forwarding
  dartssh2: ^2.9.0

  # Terminal emulator widget
  xterm: ^4.0.0

  # PTY (pseudo-terminal) for local shell sessions
  flutter_pty: ^0.4.2

  # Secure credential storage (Keychain on macOS, Credential Manager on Windows)
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # SVG rendering for OS icons
  flutter_svg: ^2.0.10

  # App settings persistence
  shared_preferences: ^2.3.2

  # File picker for SFTP upload
  file_picker: ^8.1.2

  # QR code generation (P2P sync)
  qr_flutter: ^4.1.0

  # UUID generation
  uuid: ^4.5.1

  # Path utilities
  path: ^1.9.0
  path_provider: ^2.1.4

  # Hotkey management
  hotkey_manager: ^0.2.3

  # Window management
  window_manager: ^0.3.9

  # System notifications
  local_notifier: ^0.1.6

  # WebView for code editor
  webview_flutter: ^4.8.0

  # Supabase backend integration
  supabase_flutter: ^2.5.0

  # HTTP client for Supabase migration API calls
  http: ^1.2.0

  # Plugin system
  yourssh_plugin_api:
    path: ../packages/yourssh_plugin_api
  yourssh_devops:
    path: ../packages/yourssh_devops
  yourssh_web_tools:
    path: ../packages/yourssh_web_tools
  yourssh_snippets:
    path: ../packages/yourssh_snippets

  # Cryptography utilities
  cryptography: ^2.7.0

  # Network info (LAN share)
  network_info_plus: ^6.0.0

  # HTTP server (LAN share)
  shelf: ^1.4.1

  # Markdown rendering (AI chat)
  flutter_markdown: ^0.7.1

  # Local authentication / biometrics (vault)
  local_auth: ^2.3.0

  # HMAC/SHA hashing for AWS Signature V4 (S3 browser)
  crypto: ^3.0.3

  # FFI utilities (Utf16 string conversion, Arena allocator) — Windows SSH agent named pipe
  ffi: ^2.1.3

  # XML parsing for S3 API responses
  xml: ^6.5.0

  # URL launcher (Cloudflare tunnel)
  url_launcher: ^6.3.0

  package_info_plus: ^9.0.1


dependency_overrides:
  dartssh2:
    path: ../packages/dartssh2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/monaco_editor.html
    - assets/app_icon.png
    - assets/os/
  fonts:
    - family: DejaVu Sans Mono for Powerline
      fonts:
        - asset: assets/fonts/powerline/DejaVu Sans Mono for Powerline.ttf
    - family: Inconsolata for Powerline
      fonts:
        - asset: assets/fonts/powerline/Inconsolata for Powerline.otf
    - family: Meslo LG S for Powerline
      fonts:
        - asset: assets/fonts/powerline/Meslo LG S Regular for Powerline.ttf
    - family: Source Code Pro for Powerline
      fonts:
        - asset: assets/fonts/powerline/Source Code Pro for Powerline.otf
    - family: Ubuntu Mono derivative Powerline
      fonts:
        - asset: assets/fonts/powerline/Ubuntu Mono derivative Powerline.ttf
    - family: Roboto Mono for Powerline
      fonts:
        - asset: assets/fonts/powerline/Roboto Mono for Powerline.ttf
    - family: MesloLGS NF
      fonts:
        - asset: assets/fonts/nerd/MesloLGS NF Regular.ttf
        - asset: assets/fonts/nerd/MesloLGS NF Bold.ttf
          weight: 700
        - asset: assets/fonts/nerd/MesloLGS NF Italic.ttf
          style: italic
        - asset: assets/fonts/nerd/MesloLGS NF Bold Italic.ttf
          weight: 700
          style: italic
