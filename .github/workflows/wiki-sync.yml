name: Sync Wiki

on:
  push:
    branches:
      - master
    paths:
      - 'docs/wiki/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/wiki/
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync wiki from docs/wiki/"
