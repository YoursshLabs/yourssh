name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

  # ── macOS ──────────────────────────────────────────────────────────────────
  # One universal (arm64 + x86_64) build from the arm64 runner: Flutter builds
  # both slices by default and build.sh lipos the Rust dylib, so Intel Macs are
  # covered without depending on GitHub's flaky Intel runners.
  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/yourssh_rdp/rust

      - name: Build yourssh_rdp native library
        run: bash packages/yourssh_rdp/build.sh

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      # --split-debug-info strips Dart symbols from the AOT snapshot into
      # build/symbols (20-30% smaller binary). Crash stack traces become raw
      # offsets — symbolicate with: flutter symbolize -d <unzipped symbols>.
      # The per-release *-symbols.zip attached below is the only copy; keep it.
      - name: Build macOS
        working-directory: app
        run: flutter build macos --release --split-debug-info=build/symbols

      - name: Bundle RDP library into app
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          mkdir -p "$APP/Contents/Frameworks"
          cp packages/yourssh_rdp/assets/native/macos/libyourssh_rdp.dylib \
             "$APP/Contents/Frameworks/"

      # Fail fast if either the app or the Rust dylib lost an architecture —
      # an arm64-only artifact named "universal" would brick Intel installs.
      - name: Verify universal binaries
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          for BIN in "$APP/Contents/MacOS/"* "$APP/Contents/Frameworks/libyourssh_rdp.dylib"; do
            ARCHS=$(lipo -archs "$BIN")
            echo "$BIN: $ARCHS"
            case "$ARCHS" in
              *arm64*x86_64*|*x86_64*arm64*) ;;
              *) echo "::error::$BIN is not universal ($ARCHS)"; exit 1 ;;
            esac
          done

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          zip -r "YourSSH-${{ steps.version.outputs.version }}-macOS-universal.zip" "$APP"

      - name: Zip debug symbols
        run: |
          cd app/build/symbols
          zip -r "$GITHUB_WORKSPACE/YourSSH-${{ steps.version.outputs.version }}-macOS-universal-symbols.zip" .

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP=$(find "app/build/macos/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          create-dmg \
            --volname "YourSSH" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "YourSSH-${{ steps.version.outputs.version }}-macOS-universal.dmg" \
            "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.dmg
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal-symbols.zip

  # ── Windows ────────────────────────────────────────────────────────────────
  # x64 is the standard target. arm64 (Windows on ARM / Snapdragon) is
  # supported since Flutter 3.22; ARM64 uses git-clone to install Flutter
  # because subosito/flutter-action does not support ARM64 runners.
  build-windows:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        if: runner.arch == 'X64'
        with:
          channel: stable

      - name: Setup Flutter (ARM64)
        if: runner.arch == 'ARM64'
        shell: pwsh
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$env:USERPROFILE\flutter"
          Add-Content $env:GITHUB_PATH "$env:USERPROFILE\flutter\bin"
          & "$env:USERPROFILE\flutter\bin\flutter.bat" --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/yourssh_rdp/rust

      - name: Build yourssh_rdp native library
        shell: pwsh
        run: packages/yourssh_rdp/build.ps1

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      # Dart symbols split out for size — see the macOS build step comment.
      - name: Build Windows
        working-directory: app
        run: flutter build windows --release --split-debug-info=build/symbols

      - name: Bundle RDP library into release
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          Copy-Item "packages\yourssh_rdp\assets\native\windows\yourssh_rdp.dll" `
            "app\build\windows\$arch\runner\Release\"

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content app/pubspec.yaml | Select-String '^version:').ToString().Split(':')[1].Trim().Split('+')[0]
          echo "version=$version" >> $env:GITHUB_OUTPUT

      # flutter build does not copy the VC++ CRT (msvcp140.dll, vcruntime140*.dll)
      # into Release; most x64 machines have the redistributable installed, but
      # fresh ARM64 machines/VMs do not — bundle it so Setup and the portable
      # ZIP run everywhere.
      - name: Bundle VC++ CRT runtime
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          $crt = Get-Item "$vs\VC\Redist\MSVC\*\$arch\Microsoft.VC14*.CRT" |
            Sort-Object FullName | Select-Object -Last 1
          if (-not $crt) { throw "VC++ CRT redist for $arch not found under $vs" }
          Copy-Item "$($crt.FullName)\*.dll" "app\build\windows\$arch\runner\Release\"
          Get-ChildItem "app\build\windows\$arch\runner\Release\*.dll" | Select-Object Name

      # The whole Release folder, not just yourssh.exe — the bare exe cannot run
      # without flutter_windows.dll, the plugin DLLs, and data/.
      - name: Create portable ZIP
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          Compress-Archive -Path "app\build\windows\$arch\runner\Release\*" `
            -DestinationPath "YourSSH-${ver}-Windows-${arch}-portable.zip"

      - name: Zip debug symbols
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          Compress-Archive -Path "app\build\symbols\*" `
            -DestinationPath "YourSSH-${ver}-Windows-${arch}-symbols.zip"

      - name: Install Inno Setup (ARM64 runner only)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"

          $iss  = "[Setup]`r`n"
          $iss += "AppName=YourSSH`r`n"
          $iss += "AppVersion=$ver`r`n"
          $iss += "DefaultDirName={autopf}\YourSSH`r`n"
          $iss += "DefaultGroupName=YourSSH`r`n"
          $iss += "OutputBaseFilename=YourSSH.Setup.${ver}-Windows-${arch}`r`n"
          $iss += "OutputDir=.`r`n"
          $iss += "Compression=lzma`r`n"
          $iss += "SolidCompression=yes`r`n"
          $iss += "`r`n[Files]`r`n"
          $iss += "Source: `"app\build\windows\$arch\runner\Release\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs`r`n"
          $iss += "`r`n[Icons]`r`n"
          $iss += "Name: `"{group}\YourSSH`"; Filename: `"{app}\yourssh.exe`"`r`n"
          $iss += "Name: `"{commondesktop}\YourSSH`"; Filename: `"{app}\yourssh.exe`"`r`n"
          $iss += "`r`n[Run]`r`n"
          $iss += "Filename: `"{app}\yourssh.exe`"; Description: `"Launch YourSSH`"; Flags: nowait postinstall skipifsilent`r`n"
          $iss | Out-File -FilePath "installer.iss" -Encoding UTF8
          & $iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            YourSSH-${{ steps.version.outputs.version }}-Windows-${{ matrix.arch }}-portable.zip
            YourSSH.Setup.${{ steps.version.outputs.version }}-Windows-${{ matrix.arch }}.exe
            YourSSH-${{ steps.version.outputs.version }}-Windows-${{ matrix.arch }}-symbols.zip

  # ── Linux ──────────────────────────────────────────────────────────────────
  # Produces a .deb package and a portable tar.gz for both x86_64 and arm64.
  # Pinned to 22.04 runners: the bundle inherits the build machine's glibc
  # baseline, and 24.04 runners produce binaries requiring GLIBC_2.38 that
  # refuse to start on Ubuntu 22.04 / Debian 12 (glibc 2.35/2.36).
  build-linux:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            deb_arch: amd64
          - runner: ubuntu-22.04-arm
            arch: arm64
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        if: runner.arch == 'X64'
        with:
          channel: stable

      - name: Setup Flutter (ARM64)
        if: runner.arch == 'ARM64'
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 ~/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          ~/flutter/bin/flutter --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/yourssh_rdp/rust

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            libkeybinder-3.0-dev libnotify-dev

      - name: Build yourssh_rdp native library
        run: bash packages/yourssh_rdp/build.sh

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      # Dart symbols split out for size — see the macOS build step comment.
      - name: Build Linux
        working-directory: app
        run: flutter build linux --release --split-debug-info=build/symbols

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Locate build bundle
        id: bundle
        run: |
          # Flutter outputs to the host architecture directory (x64 or arm64).
          ARCH="${{ matrix.arch }}"
          DIR="app/build/linux/${ARCH}/release/bundle"
          [ -d "$DIR" ] || DIR="app/build/linux/x64/release/bundle"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Bundle RDP library into release
        run: |
          cp packages/yourssh_rdp/assets/native/linux/libyourssh_rdp.so \
             "${{ steps.bundle.outputs.dir }}/lib/"

      - name: Create .deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DEB_ARCH="${{ matrix.deb_arch }}"
          BUNDLE="${{ steps.bundle.outputs.dir }}"
          PKG="yourssh_${VERSION}_${DEB_ARCH}"

          mkdir -p "$PKG/DEBIAN" \
                   "$PKG/usr/share/yourssh" \
                   "$PKG/usr/bin" \
                   "$PKG/usr/share/applications"

          cp -r "$BUNDLE"/. "$PKG/usr/share/yourssh/"
          ln -s /usr/share/yourssh/yourssh "$PKG/usr/bin/yourssh"

          cat > "$PKG/usr/share/applications/yourssh.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=YourSSH
          Exec=/usr/share/yourssh/yourssh
          Icon=yourssh
          Type=Application
          Categories=Network;
          DESKTOP

          cat > "$PKG/DEBIAN/control" << CTRL
          Package: yourssh
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: YourSSH Team
          Description: YourSSH - SSH client
          CTRL

          dpkg-deb --build "$PKG"

      - name: Create tar.gz archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          BUNDLE="${{ steps.bundle.outputs.dir }}"
          tar -czf "YourSSH-${VERSION}-Linux-${ARCH}.tar.gz" \
            -C "$(dirname "$BUNDLE")" "$(basename "$BUNDLE")"

      - name: Zip debug symbols
        run: |
          cd app/build/symbols
          zip -r "$GITHUB_WORKSPACE/YourSSH-${{ steps.version.outputs.version }}-Linux-${{ matrix.arch }}-symbols.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            yourssh_${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}.deb
            YourSSH-${{ steps.version.outputs.version }}-Linux-${{ matrix.arch }}.tar.gz
            YourSSH-${{ steps.version.outputs.version }}-Linux-${{ matrix.arch }}-symbols.zip

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: YourSSH v${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.zip
            YourSSH-${{ steps.version.outputs.version }}-macOS-universal.dmg
            YourSSH-${{ steps.version.outputs.version }}-Windows-x64-portable.zip
            YourSSH.Setup.${{ steps.version.outputs.version }}-Windows-x64.exe
            YourSSH-${{ steps.version.outputs.version }}-Windows-arm64-portable.zip
            YourSSH.Setup.${{ steps.version.outputs.version }}-Windows-arm64.exe
            yourssh_${{ steps.version.outputs.version }}_amd64.deb
            YourSSH-${{ steps.version.outputs.version }}-Linux-x86_64.tar.gz
            yourssh_${{ steps.version.outputs.version }}_arm64.deb
            YourSSH-${{ steps.version.outputs.version }}-Linux-arm64.tar.gz
            YourSSH-${{ steps.version.outputs.version }}-*-symbols.zip
