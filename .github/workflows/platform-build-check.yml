# On-demand cross-platform build verification (debug builds + tests).
# Runs when this file itself changes on develop, or manually via
# workflow_dispatch (available once the file lands on the default branch).
name: Platform Build Check

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - .github/workflows/platform-build-check.yml

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

      - name: Build Windows (debug)
        working-directory: app
        run: flutter build windows --debug

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            libkeybinder-3.0-dev libnotify-dev

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

      - name: Build Linux (debug)
        working-directory: app
        run: flutter build linux --debug
